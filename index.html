
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaultly - Stop Impulse Spending</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-2D7N9W9V9N"></script>

  gtag('config', 'G-2D7N9W9V9N', {

  gtag('event', 'page_view', {

    page_location: window.location.href,
    page_path: window.location.pathname
  });

<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#2D2249; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:white; }
.page { max-width:480px; margin:0 auto; }
.vh-logo-bar { padding:20px; }
.vh-logo-bar img { height:60px; }
.vh { padding:24px; }
.vh-badge { display:inline-block; padding:6px 14px; border-radius:20px; background:rgba(255,255,255,.1); margin-bottom:20px; font-size:12px; }
.vh-h1 { font-size:34px; font-weight:800; margin-bottom:14px; line-height:1.15; }
.vh-sub { color:rgba(255,255,255,.7); line-height:1.6; margin-bottom:24px; }
.vh-row { display:flex; gap:8px; margin-bottom:18px; }
.vh-input {
flex:1;
padding:14px;
border:none;
border-radius:10px;
background:rgba(255,255,255,.1);
color:white;
}
.vh-btn {
padding:14px 18px;
border:none;
border-radius:10px;
background:#7C5CFC;
color:white;
font-weight:700;
cursor:pointer;
}
.vh-phone {
margin-top:24px;
background:rgba(255,255,255,.05);
padding:16px;
border-radius:18px;
}
.vh-screen {
background:#1A1035;
padding:16px;
border-radius:14px;
}
.vh-card {
background:rgba(124,92,252,.15);
padding:14px;
border-radius:12px;
margin-bottom:10px;
}
.vh-vname { font-size:12px; color:rgba(255,255,255,.6); }
.vh-amt { font-size:28px; font-weight:800; margin:8px 0; }
.vh-break {
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
background:rgba(255,255,255,.08);
color:white;
cursor:pointer;
}
.mvp-wrap { padding:24px; }
.mvp-cta {
padding:24px;
border-radius:18px;
background:rgba(255,255,255,.05);
text-align:center;
}
.mvp-cta-btn {
display:block;
margin-top:14px;
padding:14px;
border-radius:10px;
background:#7C5CFC;
color:white;
text-decoration:none;
font-weight:700;
}
.sp {
padding:40px 24px;
text-align:center;
}
.final-input {
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:rgba(255,255,255,.1);
color:white;
margin-bottom:10px;
}
.final-btn {
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#7C5CFC;
color:white;
font-weight:700;
cursor:pointer;
}
</style>
</head>

<body>
<div class="page">

<div class="vh-logo-bar">
<img src="LOGO.png" alt="Vaultly">
</div>

<div class="vh">
<div class="vh-badge">Beta — 47 of 200 spots taken</div>

<h1 class="vh-h1">Your savings finally stick.</h1>

<p class="vh-sub">
Vaultly adds friction between you and your money — so one impulse doesn't undo weeks of progress.
</p>

<div class="vh-row">
<input class="vh-input" id="hero-email" placeholder="Enter your email">
<button class="vh-btn" onclick="vaultlySubmit('hero-email',this)">Get early access</button>
</div>

<div class="vh-phone">
<div class="vh-screen">

<div class="vh-card">
<div class="vh-vname">Trip to Japan 🇯🇵</div>
<div class="vh-amt">$2,400</div>
<button class="vh-break">Break vault now — wait 24hrs or pay $15</button>
</div>

</div>
</div>
</div>

<div class="mvp-wrap">
<div class="mvp-cta">
<div>🚀 Live now</div>
<h2>Try our working prototype</h2>
<a href="https://myvaultly.base44.app" class="mvp-cta-btn" target="_blank">
Try Vaultly Prototype →
</a>
</div>
</div>

<div class="sp">
<input class="final-input" id="final-email" placeholder="Enter your email address">
<button class="final-btn" onclick="vaultlySubmit('final-email',this)">
Claim your beta spot
</button>
</div>

</div>

<script>
function vaultlySubmit(id, btn) {
var email = document.getElementById(id).value;

if (!email || !email.includes('@')) {
alert('Please enter a valid email address.');
return;
}

btn.textContent = 'Joining...';
btn.disabled = true;

fetch('https://a.klaviyo.com/client/subscriptions/?company_id=VG3Xut', {
method: 'POST',
headers: {
'content-type': 'application/json',
'revision': '2023-02-22'
},
body: JSON.stringify({
data:{
type:'subscription',
attributes:{
list_id:'UJxyyy',
email:email
}
}
})
})
.then(() => {
btn.textContent = "✓ You're on the list!";
btn.style.background = '#1A7A4A';
document.getElementById(id).value = '';
})
.catch(() => {
alert('Something went wrong.');
btn.disabled = false;
});
}
</script>

</body>
</html>
